# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Gemini"

ai_usage_summary: |
  Used Claude Code (Claude Sonnet 4.6) for architecture discussion, code structure,
  and implementation of the ranking pipeline. Used Gemini for initial planning.
  No candidate data was fed to any LLM — all scoring is rule-based and deterministic.
  The ranking logic runs entirely offline with no API calls during execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based multi-signal ranker with explicit explainability. Five scoring
  components weighted as: skill relevance (35%), experience fit (20%),
  behavioral signals (20%), availability/notice period (15%), location (10%).

  Skill scoring uses a two-tier taxonomy of AI/ML/NLP/Search skills with a
  trust multiplier derived from endorsement count and usage duration — this
  catches keyword stuffers who list "expert" skills with zero months of use.

  Three disqualification rules: (1) honeypot detection — expert/advanced
  proficiency with 0 months duration is an immediate filter; (2) all-consulting
  disqualifier — candidates whose entire career is at Big-IT services firms
  (TCS, Infosys, Wipro, Accenture, etc.) are excluded; (3) pure academia —
  candidates with only university/research-institute roles are filtered out.

  Reasoning strings use five rotating templates keyed by score to ensure
  variation across the 100 ranked entries. Runtime: ~60 seconds for 100K
  candidates on CPU with 8GB RAM.

